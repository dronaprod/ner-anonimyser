<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NER Anonymisation Report</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 12px; background: #1a1a2e; color: #e8e8e8; }
    .header { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; padding: 8px 12px; background: #16213e; border-radius: 8px; }
    .header h1 { margin: 0; font-size: 1.25rem; }
    .header .meta { color: #94a3b8; font-size: 0.875rem; }
    .summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .summary .card { background: #16213e; padding: 12px 16px; border-radius: 8px; min-width: 140px; }
    .summary .card .num { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
    .summary .card .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; }
    .main { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: start; }
    @media (max-width: 1200px) { .main { grid-template-columns: 1fr; } }
    .panel { background: #16213e; border-radius: 8px; overflow: hidden; }
    .panel h2 { margin: 0; padding: 10px 12px; font-size: 0.875rem; background: #0f3460; color: #94a3b8; text-transform: uppercase; }
    .panel .body { padding: 12px; max-height: 70vh; overflow: auto; }
    .text-view { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.5; }
    .text-view mark { border-radius: 2px; padding: 0 2px; font-weight: 500; }
    .center-panel { min-width: 320px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #2d3748; }
    th { color: #94a3b8; font-weight: 600; }
    .found-by { font-size: 11px; color: #64748b; }
    .type-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .loading { padding: 24px; text-align: center; color: #94a3b8; }
    .error { padding: 24px; color: #f87171; }
    select { background: #0f3460; color: #e8e8e8; border: 1px solid #334155; padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>NER Anonymisation Report</h1>
    <span class="meta" id="meta"></span>
  </div>
  <div class="summary" id="summary"></div>
  <div class="main">
    <div class="panel">
      <h2>Original text</h2>
      <div class="body">
        <select id="fileSelect" style="display:none;"></select>
        <div id="originalText" class="text-view loading">Loading report…</div>
      </div>
    </div>
    <div class="panel center-panel">
      <h2>PII found (value, type, confidence, stage)</h2>
      <div class="body">
        <table id="findingsTable">
          <thead><tr><th>Value</th><th>Type</th><th>Score</th><th>Found by</th></tr></thead>
          <tbody id="findingsBody"></tbody>
        </table>
      </div>
      <h2>Anonymised replacements (contextual)</h2>
      <div class="body">
        <table id="replacementsTable">
          <thead><tr><th>Original</th><th>Anonymised</th><th>Type</th></tr></thead>
          <tbody id="replacementsBody"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h2>Anonymised text</h2>
      <div class="body">
        <div id="anonymizedText" class="text-view"></div>
      </div>
    </div>
  </div>
  <script>
    const TYPE_COLORS = {
      person: '#f59e0b', name: '#f59e0b', organization: '#8b5cf6', 'phone number': '#06b6d4',
      email: '#10b981', address: '#6366f1', date: '#ec4899', location: '#14b8a6',
      suspicious_token: '#64748b', ssn: '#ef4444', 'credit card number': '#ef4444',
      'bank account number': '#ef4444', 'passport number': '#ef4444', 'ip address': '#f97316',
      username: '#a855f7'
    };
    function typeColor(t) {
      const k = (t || '').toLowerCase();
      return TYPE_COLORS[k] || '#64748b';
    }
    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
    function highlightText(text, replacements, side) {
      if (!replacements || replacements.length === 0) return escapeHtml(text);
      const key = side === 'original' ? 'original_value' : 'anonymized_value';
      const sorted = [...replacements].sort((a, b) => {
        const posA = text.indexOf(a[key]);
        const posB = text.indexOf(b[key]);
        return posA - posB;
      });
      let out = '';
      let last = 0;
      for (const r of sorted) {
        const val = r[key];
        const pos = text.indexOf(val, last);
        if (pos === -1) continue;
        out += escapeHtml(text.slice(last, pos));
        const color = typeColor(r.pii_type);
        out += '<mark style="background:' + color + '33;color:' + color + '" data-type="' + escapeHtml(r.pii_type) + '">' + escapeHtml(val) + '</mark>';
        last = pos + val.length;
      }
      out += escapeHtml(text.slice(last));
      return out;
    }
    function renderFile(data, fileIndex) {
      const file = data.files[fileIndex];
      if (!file) return;
      const originalEl = document.getElementById('originalText');
      const anonymizedEl = document.getElementById('anonymizedText');
      originalEl.innerHTML = highlightText(file.original_text, file.all_replacements, 'original');
      anonymizedEl.innerHTML = highlightText(file.anonymized_text, file.all_replacements, 'anonymized');
      const findingsBody = document.getElementById('findingsBody');
      findingsBody.innerHTML = (file.all_findings || []).map(f => {
        const foundBy = (f.found_by || []).join(', ');
        const color = typeColor(f.pii_type);
        return '<tr><td>' + escapeHtml(f.value) + '</td><td><span class="type-badge" style="background:' + color + '33;color:' + color + '">' + escapeHtml(f.pii_type) + '</span></td><td>' + (f.score != null ? f.score : '') + '</td><td class="found-by">' + escapeHtml(foundBy) + '</td></tr>';
      }).join('');
      const replacementsBody = document.getElementById('replacementsBody');
      replacementsBody.innerHTML = (file.all_replacements || []).map(r => {
        const color = typeColor(r.pii_type);
        return '<tr><td>' + escapeHtml(r.original_value) + '</td><td>' + escapeHtml(r.anonymized_value) + '</td><td><span class="type-badge" style="background:' + color + '33;color:' + color + '">' + escapeHtml(r.pii_type) + '</span></td></tr>';
      }).join('');
    }
    async function load() {
      try {
        const res = await fetch('/report.json');
        if (!res.ok) throw new Error(res.statusText || 'Failed to load report');
        const data = await res.json();
        document.getElementById('meta').textContent = data.created_at + ' — ' + (data.source_files || []).join(', ');
        document.getElementById('summary').innerHTML =
          '<div class="card"><span class="num">' + (data.total_chunks_anonymized ?? 0) + '</span><span class="label">Chunks anonymised</span></div>' +
          '<div class="card"><span class="num">' + (data.total_chunks_not_anonymized ?? 0) + '</span><span class="label">Chunks unchanged</span></div>' +
          '<div class="card"><span class="num">' + (data.files?.length ?? 0) + '</span><span class="label">Files</span></div>';
        const select = document.getElementById('fileSelect');
        if (data.files && data.files.length > 1) {
          select.style.display = 'block';
          select.innerHTML = data.files.map((f, i) => '<option value="' + i + '">' + escapeHtml(f.file_name) + '</option>').join('');
          select.onchange = () => renderFile(data, parseInt(select.value, 10));
        }
        renderFile(data, 0);
      } catch (e) {
        document.getElementById('originalText').className = 'text-view error';
        document.getElementById('originalText').textContent = 'Error: ' + e.message + '. Run the NER pipeline first (without --no-report), then start the UI.';
      }
    }
    load();
  </script>
</body>
</html>
